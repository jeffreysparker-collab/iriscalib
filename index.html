<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>IrisMeasure</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050508;--surf:#0d0d18;--surf2:#141425;
  --border:rgba(100,160,255,.13);--accent:#4af0c8;
  --accent2:#7b8fff;--accent3:#ff6b9d;--warn:#ffb347;
  --text:#e8eaf6;--dim:#5a6090;
  --mono:'Space Mono',monospace;--sans:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}
#app{display:flex;flex-direction:column;height:100%;min-height:100vh}

header{
  display:flex;align-items:center;gap:10px;padding:0 18px;height:50px;
  background:var(--surf);border-bottom:1px solid var(--border);
  flex-shrink:0;position:sticky;top:0;z-index:5;
}
.logo{font-size:17px;font-weight:800;color:var(--accent);letter-spacing:-.5px}
.logo span{color:var(--dim);font-weight:400}
.pill{margin-left:auto;display:flex;align-items:center;gap:6px;padding:4px 11px;
  border-radius:20px;background:var(--surf2);border:1px solid var(--border);
  font-family:var(--mono);font-size:11px;color:var(--dim)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--dim);transition:background .3s}
.dot.on{background:var(--accent);box-shadow:0 0 7px var(--accent)}
.dot.rec{background:var(--accent3);box-shadow:0 0 7px var(--accent3);animation:blink .7s infinite alternate}
.dot.warn{background:var(--warn);box-shadow:0 0 7px var(--warn)}
@keyframes blink{from{opacity:.4}to{opacity:1}}

#camwrap{
  position:relative;width:100%;
  height:clamp(200px,55vw,55vh);
  background:#000;overflow:hidden;flex-shrink:0;
}
video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
canvas#overlay{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:3}

#panel{
  background:var(--surf);border-top:1px solid var(--border);
  padding:16px 18px 40px;flex:1;
  display:flex;flex-direction:column;gap:14px;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}

#instr{font-family:var(--mono);font-size:11px;color:var(--dim);line-height:1.8;min-height:32px}
#instr span{color:var(--accent)}
#instr .warn{color:var(--warn)}

/* Pose badge */
#poseBadge{
  font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:5px;
  display:inline-flex;align-items:center;gap:6px;transition:all .25s;
}
#poseBadge.ok    {background:rgba(74,240,200,.08); border:1px solid rgba(74,240,200,.3);  color:var(--accent)}
#poseBadge.warn  {background:rgba(255,179,71,.08);  border:1px solid rgba(255,179,71,.4);  color:var(--warn)}
#poseBadge.bad   {background:rgba(255,107,157,.08); border:1px solid rgba(255,107,157,.4); color:var(--accent3)}
#poseBadge.hidden{display:none}

/* Progress ring */
#recRing{display:none;flex-direction:column;align-items:center;gap:8px}
.ring-wrap{position:relative;width:80px;height:80px}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--surf2);stroke-width:6}
.ring-fill{fill:none;stroke:var(--accent3);stroke-width:6;stroke-linecap:round;
  stroke-dasharray:220;stroke-dashoffset:220;transition:stroke-dashoffset .15s linear}
.ring-time{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:18px;font-weight:700;color:var(--accent3)}
.ring-label{font-family:var(--mono);font-size:10px;color:var(--warn);letter-spacing:.8px}
.ring-counts{font-family:var(--mono);font-size:10px;color:var(--dim)}

/* Result cards */
.rrow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.rcard{background:var(--surf2);border:1px solid var(--border);border-radius:8px;
  padding:10px 14px;position:relative;overflow:hidden}
.rcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.rcard.L::before{background:var(--accent2)}
.rcard.R::before{background:var(--accent3)}
.rlbl{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:1px;margin-bottom:4px}
.rval{font-size:26px;font-weight:800;letter-spacing:-1px;line-height:1}
.rval.pending{color:var(--dim);font-size:16px;font-weight:400}
.runit{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:2px}
.rci{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:3px;line-height:1.6}
.rci span{color:var(--accent)}

.btnrow{display:flex;gap:8px}
.btn{flex:1;padding:13px;border-radius:8px;font-family:var(--mono);font-size:11px;
  letter-spacing:.5px;cursor:pointer;transition:all .2s;border:1px solid;
  -webkit-tap-highlight-color:transparent;background:transparent}
.btn-primary{border-color:rgba(74,240,200,.4);color:var(--accent);background:rgba(74,240,200,.07)}
.btn-primary:active{background:rgba(74,240,200,.18)}
.btn-primary:disabled{opacity:.3;cursor:default;pointer-events:none}
.btn-rec{border-color:rgba(255,107,157,.5);color:var(--accent3);background:rgba(255,107,157,.08);font-size:13px;padding:15px}
.btn-rec:active{background:rgba(255,107,157,.2)}
.btn-rec:disabled{opacity:.3;cursor:default;pointer-events:none}
.btn-ghost{border-color:var(--border);color:var(--dim)}
.btn-ghost:active{background:var(--surf2)}
.btn-export{border-color:rgba(74,240,200,.25);color:var(--accent);background:rgba(74,240,200,.04);font-size:10px}
.btn-export:disabled{opacity:.3;cursor:default;pointer-events:none}

/* Debug */
#debugPanel{display:none;font-family:var(--mono);font-size:9px;color:var(--dim);
  background:var(--surf2);border:1px solid var(--border);border-radius:6px;
  padding:8px 10px;line-height:1.9}
#debugPanel .dlbl{color:var(--warn);font-size:10px;margin-bottom:2px}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:rgba(74,240,200,.1);border:1px solid var(--accent);border-radius:8px;
  padding:9px 16px;font-family:var(--mono);font-size:12px;color:var(--accent);
  transition:transform .3s;white-space:nowrap;z-index:999;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">Iris<span>Measure</span></div>
    <div class="pill"><div class="dot" id="dot"></div><span id="stxt">IDLE</span></div>
  </header>

  <div id="camwrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
  </div>

  <div id="panel">

    <div id="instr">Tap <span>▶ START</span> then look straight at the camera.</div>
    <div id="poseBadge" class="hidden">—</div>

    <!-- Recording ring -->
    <div id="recRing">
      <div class="ring-wrap">
        <svg width="80" height="80" viewBox="0 0 80 80">
          <circle class="ring-bg"   cx="40" cy="40" r="35"/>
          <circle class="ring-fill" cx="40" cy="40" r="35" id="ringFill"/>
        </svg>
        <div class="ring-time" id="ringTime">30</div>
      </div>
      <div class="ring-label">● RECORDING</div>
      <div class="ring-counts" id="ringCounts">0 samples</div>
    </div>

    <!-- Results -->
    <div class="rrow">
      <div class="rcard L">
        <div class="rlbl">LEFT IRIS</div>
        <div class="rval pending" id="valL">—</div>
        <div class="runit" id="unitL">not measured</div>
        <div class="rci"  id="ciL"></div>
      </div>
      <div class="rcard R">
        <div class="rlbl">RIGHT IRIS</div>
        <div class="rval pending" id="valR">—</div>
        <div class="runit" id="unitR">not measured</div>
        <div class="rci"  id="ciR"></div>
      </div>
    </div>

    <!-- Buttons -->
    <div class="btnrow" id="startRow">
      <button class="btn btn-primary" id="startBtn">▶ START</button>
    </div>
    <div class="btnrow" id="recRow" style="display:none">
      <button class="btn btn-rec" id="recBtn" disabled>⏺ RECORD 30s</button>
    </div>
    <div class="btnrow" id="actionRow" style="display:none">
      <button class="btn btn-ghost" id="retryBtn">↺ RETRY</button>
      <button class="btn btn-export" id="exportBtn" disabled>↓ EXPORT CSV</button>
    </div>

    <!-- Debug -->
    <div id="debugPanel">
      <div class="dlbl">DEBUG</div>
      <div id="dbg1">—</div>
      <div id="dbg2">—</div>
      <div id="dbg3">—</div>
      <div id="dbg4">—</div>
    </div>

  </div>
</div>
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.17.0/dist/tf-core.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.17.0/dist/tf-backend-webgl.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection@1.0.5/dist/face-landmarks-detection.min.js" crossorigin="anonymous"></script>
<script>
const $ = id => document.getElementById(id);
const REC_SECS = 30;
const CIRC = 2 * Math.PI * 35; // SVG ring circumference for r=35

// ── state ─────────────────────────────────────────────────────────────────────
const S = {
  running:  false,
  detector: null,
  recording: false,
  recStart:  null,
  samples:   [],   // {lMm, rMm, scale, asymm} per valid frame
  statsL:    null,
  statsR:    null,
  allRaw:    [],
};

const video   = $('video');
const overlay = $('overlay');
const octx    = overlay.getContext('2d');

const toast = msg => {
  const t=$('toast'); t.textContent=msg;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000);
};
const setStatus = (txt, mode='') => {
  $('stxt').textContent=txt;
  $('dot').className='dot'+(mode?' '+mode:'');
};

// ── canvas sizing ─────────────────────────────────────────────────────────────
function resizeCanvas(){
  const w=$('camwrap').clientWidth, h=$('camwrap').clientHeight;
  if(overlay.width!==w||overlay.height!==h){ overlay.width=w; overlay.height=h; }
}

// ── coordinate mapping (mirrored video) ───────────────────────────────────────
function videoPxToCanvas(vx, vy){
  const W=overlay.width, H=overlay.height;
  const vw=video.videoWidth||1280, vh=video.videoHeight||720;
  const sc=Math.max(W/vw, H/vh);
  const offX=(W-vw*sc)/2, offY=(H-vh*sc)/2;
  return { cx:(vw-vx)*sc+offX, cy:vy*sc+offY };
}
function canvasScale(){
  const W=overlay.width, H=overlay.height;
  const vw=video.videoWidth||1280, vh=video.videoHeight||720;
  return Math.max(W/vw, H/vh);
}

// ── iris radius in video pixels ───────────────────────────────────────────────
// MediaPipe refined landmarks: center=468(L)/473(R), 4 edge pts at 469-472/474-477
// ── iris geometry ─────────────────────────────────────────────────────────────
// Raw mean radius from 4 edge landmarks around center (video pixels)
function irisRadiusRaw(kps, ci, es){
  let s=0;
  for(let i=es;i<es+4;i++) s+=Math.hypot(kps[i].x-kps[ci].x, kps[i].y-kps[ci].y);
  return s/4;
}

// Roll angle of the camera/face from the landmark pair that should be horizontal.
// We use the line between the two iris centers — in a level frontal face this is
// perfectly horizontal. Any tilt appears as a non-zero angle here.
function rollAngle(kps){
  // iris centers: 468=left, 473=right (in video/face space, pre-mirror)
  const dx = kps[473].x - kps[468].x;
  const dy = kps[473].y - kps[468].y;
  return Math.atan2(dy, dx);  // radians; 0 = level
}

// Iris radius corrected for camera roll.
// When the camera is tilted by angle θ, the horizontal span of the iris
// gets projected onto a rotated axis. We decompose the 4 edge vectors into
// components along and perpendicular to the tilt axis and take the mean
// of the corrected radii.
function irisRadiusCorrected(kps, ci, es, roll){
  const cosR = Math.cos(roll), sinR = Math.sin(roll);
  let s=0;
  for(let i=es;i<es+4;i++){
    const dx = kps[i].x - kps[ci].x;
    const dy = kps[i].y - kps[ci].y;
    // Rotate edge vector back to axis-aligned frame
    const dx2 =  dx*cosR + dy*sinR;
    const dy2 = -dx*sinR + dy*cosR;
    s += Math.hypot(dx2, dy2);
  }
  return s/4;
}

// Parallax correction for iris being on a sphere ~8mm proud of the corneal plane.
// At close range the iris subtends a larger angle than a flat target would.
// We estimate face depth from the inter-ocular distance in pixels vs known mm:
//   depth_px ≈ ipd_px * (focalLength / ipd_mm)
// Then apply:  r_corrected = r_raw / (1 + CORNEAL_DEPTH_MM * mmPerPx * scale)
// In practice this is a small multiplicative factor.
const CORNEAL_PROTRUSION_MM = 8.0;  // how far iris plane sits in front of face plane

function parallaxFactor(mmPerPx, ipdPx){
  // The iris sits ~8mm proud of the nominal face plane (corneal protrusion).
  // At close range this makes the iris subtend a slightly larger angle than a
  // flat target at the same nominal depth would, so we slightly over-estimate radius.
  // We estimate depth from IPD pixels: depth_mm ≈ IPD_MM_MEAN / mmPerPx
  // where IPD_MM_MEAN = 63mm (average inter-pupillary distance).
  // Then: correction = CORNEAL_PROTRUSION_MM / depth_mm = CORNEAL_PROTRUSION_MM * mmPerPx / IPD_MM_MEAN
  // Factor = 1 / (1 + correction)
  // At 60cm: mmPerPx≈0.105 → correction≈1.3%  → factor≈0.987
  // At 40cm: mmPerPx≈0.158 → correction≈2.0%  → factor≈0.980
  // At 30cm: mmPerPx≈0.210 → correction≈2.7%  → factor≈0.974
  const IPD_MM_MEAN = 63.0;
  const correction = CORNEAL_PROTRUSION_MM * mmPerPx / IPD_MM_MEAN;
  return 1 / (1 + correction);
}

// ── landmark-based scale estimator ───────────────────────────────────────────
// Weighted least squares: w_i = 1/sigma_i^2
//
// Anchor selection rationale:
//   - Outer canthus (356↔127): large span, good signal, BUT sits near frame edges
//     where barrel distortion is worst. Inflate sigma to reduce its weight.
//   - Inner canthus (362↔133): short span but near optical axis, low distortion.
//   - Eye fissure L/R (263↔362, 33↔133): same depth as iris, very low distortion,
//     both averaged so per-eye asymmetry cancels. Best anchors.
//   - Nose alare (129↔358): near optical axis, but high ethnic/sex variance → high sigma.
//   - Brow width (300↔70): forehead landmarks, stable, near center frame.
//
// sigma values tuned so:
//   fissure pair  weight ≈ 0.25 each  (total 0.50)
//   inner canthus weight ≈ 0.16
//   nose alare    weight ≈ 0.06
//   outer canthus weight ≈ 0.03  (heavily discounted for distortion)
// Anchor weight rationale (w = 1/sigma^2, normalized):
//   fissure L+R:    sigma=1.8 → w=0.309 each  → combined 61.8%  ← dominant
//   inner canthus:  sigma=2.5 → w=0.160        →          16.0%
//   nose alare:     sigma=4.0 → w=0.063        →           6.3%
//   outer canthus:  sigma=12  → w=0.007        →           0.7%  (nearly negligible)
// Outer canthus kept only as a very weak sanity anchor — barrel distortion at
// frame edges makes it unreliable, especially at close range.
const ANCHORS = [
  // [idxA, idxB, meanMm, sigmaMm]
  [263, 362, 30.0, 1.8],   // left  eye fissure — near optical axis, same depth as iris
  [ 33, 133, 30.0, 1.8],   // right eye fissure — same
  [362, 133, 33.0, 2.5],   // inner canthus to inner canthus
  [129, 358, 35.0, 4.0],   // nose alare — ethnic variance, lower weight
  [356, 127, 90.0, 12.0],  // outer canthus — barrel distortion risk, nearly ignored
];

// Pose thresholds — frames outside these are rejected entirely
const MAX_YAW_ASYMM    = 1.35; // yaw rejection
const MAX_ROLL_DEG     = 4;    // hard reject above 4° — at 6° error was ~0.3mm
const SOFT_ROLL_DEG    = 2;    // below this: full weight; above: weight tapers to 0 at MAX

// Distance thresholds based on IPD in pixels.
// At ~60cm: ipdPx ≈ 100-130.  Too close (<40cm): ipdPx > 150.  Too far (>90cm): ipdPx < 70.
// Tightened close threshold — barrel distortion grows fast below ~40cm
const IPD_TOO_CLOSE_PX = 150;
const IPD_TOO_FAR_PX   = 72;

function estimateScale(kps){
  // ── Yaw guard ────────────────────────────────────────────────────────────
  const midX  = (kps[468].x + kps[473].x) / 2;
  const lDist = Math.abs(midX - kps[356].x);
  const rDist = Math.abs(midX - kps[127].x);
  const asymm = Math.max(lDist,rDist) / (Math.min(lDist,rDist) + 0.1);
  if(asymm > MAX_YAW_ASYMM) return null;

  // ── Roll guard + soft weight ─────────────────────────────────────────────
  const roll    = rollAngle(kps);
  const rollDeg = Math.abs(roll * 180 / Math.PI);
  if(rollDeg > MAX_ROLL_DEG) return null;
  // Soft taper: full weight below SOFT_ROLL_DEG, linearly tapers to ~0.05 at MAX_ROLL_DEG
  // This means frames at 3.9° contribute much less than frames at 1° — they're averaged in
  // but can't dominate the result the way binary accept/reject allows.
  const rollWeight = rollDeg <= SOFT_ROLL_DEG
    ? 1.0
    : Math.max(0.05, 1.0 - (rollDeg - SOFT_ROLL_DEG) / (MAX_ROLL_DEG - SOFT_ROLL_DEG));

  // ── Pitch guard (rough) ──────────────────────────────────────────────────
  // Nose tip (1) should be below eye midpoint. If it's way off, face is pitched.
  const eyeMidY = (kps[468].y + kps[473].y) / 2;
  const ipdPx   = Math.hypot(kps[473].x-kps[468].x, kps[473].y-kps[468].y);
  const pitchOff= Math.abs(kps[1].y - eyeMidY) / (ipdPx + 0.1);
  // pitchOff ≈ 0.5–0.9 when frontal; far from that = pitched
  // We don't reject on this, just store it for the CSV

  // ── Weighted scale ───────────────────────────────────────────────────────
  let num=0, den=0;
  for(const [a,b,meanMm,sigmaMm] of ANCHORS){
    const d = Math.hypot(kps[a].x-kps[b].x, kps[a].y-kps[b].y);
    if(d < 5) continue;
    const w = (1/(sigmaMm*sigmaMm)) * rollWeight; // roll-weight all anchors equally
    num += (meanMm/d) * w;
    den += w;
  }
  if(den===0) return null;

  const mmPerPx = num/den;
  const pFactor = parallaxFactor(mmPerPx, ipdPx);

  // Distance status from IPD pixel size
  let distStatus = 'ok';
  if(ipdPx > IPD_TOO_CLOSE_PX) distStatus = 'close';
  else if(ipdPx < IPD_TOO_FAR_PX) distStatus = 'far';

  return { mmPerPx, roll, rollDeg, rollWeight, asymm, ipdPx, pitchOff, pFactor, distStatus };
}

// ── statistics ────────────────────────────────────────────────────────────────
function computeStats(arr){
  const n = arr.length;
  if(n<2) return null;
  const mean = arr.reduce((a,b)=>a+b,0)/n;
  const variance = arr.reduce((s,v)=>s+(v-mean)**2,0)/(n-1);
  const se = Math.sqrt(variance/n);
  const t = n>=120?1.980:n>=60?2.000:n>=30?2.042:n>=20?2.093:n>=10?2.228:2.776;
  return {mean, ci:t*se, n, se};
}

// ── progress ring ─────────────────────────────────────────────────────────────
function updateRing(elapsed){
  const pct = Math.min(1, elapsed / (REC_SECS*1000));
  const remaining = Math.max(0, Math.ceil((REC_SECS*1000 - elapsed)/1000));
  $('ringFill').style.strokeDashoffset = (CIRC*(1-pct)).toFixed(2);
  $('ringTime').textContent = remaining;
  $('ringCounts').textContent = `${S.samples.length} samples`;
}

// ── finalize recording ────────────────────────────────────────────────────────
function finalize(){
  S.recording=false; S.recStart=null;
  $('recRing').style.display='none';

  // Weighted mean: frames with less roll contribute more
  // Use rollWeight as the per-frame weight for the mean, but still
  // compute unweighted variance over all accepted samples for the CI
  // (conservative — doesn't assume weighted samples are independent)
  const weightedMean = (vals, weights) => {
    const wSum = weights.reduce((a,b)=>a+b,0);
    return vals.reduce((s,v,i)=>s+v*weights[i],0) / wSum;
  };
  const weights = S.samples.map(s=>s.rollWeight);
  const lVals   = S.samples.map(s=>s.lMm);
  const rVals   = S.samples.map(s=>s.rMm);
  const lMean   = weightedMean(lVals, weights);
  const rMean   = weightedMean(rVals, weights);
  // Compute stats using unweighted variance around the weighted mean
  const statsFromWeightedMean = (vals, mean) => {
    const n = vals.length;
    if(n<2) return null;
    const variance = vals.reduce((s,v)=>s+(v-mean)**2,0)/(n-1);
    const se = Math.sqrt(variance/n);
    const t = n>=120?1.980:n>=60?2.000:n>=30?2.042:n>=20?2.093:n>=10?2.228:2.776;
    return {mean, ci:t*se, n, se};
  };
  S.statsL = statsFromWeightedMean(lVals, lMean);
  S.statsR = statsFromWeightedMean(rVals, rMean);

  if(!S.statsL && !S.statsR){
    toast('Too few valid frames — try again');
    setStatus('READY','on');
    return;
  }

  const fmt  = st => st ? st.mean.toFixed(2) : '—';
  const ci   = st => st ? `95% CI ±${st.ci.toFixed(2)}mm  n=${st.n}` : '';

  $('valL').textContent = fmt(S.statsL); $('valL').className = S.statsL ? 'rval' : 'rval pending';
  $('valR').textContent = fmt(S.statsR); $('valR').className = S.statsR ? 'rval' : 'rval pending';
  $('unitL').textContent = S.statsL ? 'mm  ✓ averaged' : 'not measured';
  $('unitR').textContent = S.statsR ? 'mm  ✓ averaged' : 'not measured';
  $('ciL').innerHTML = S.statsL ? `<span>${ci(S.statsL)}</span>` : '';
  $('ciR').innerHTML = S.statsR ? `<span>${ci(S.statsR)}</span>` : '';

  if(S.statsL && S.statsR){
    const diff   = Math.abs(S.statsL.mean - S.statsR.mean);
    const larger = S.statsL.mean >= S.statsR.mean ? 'LEFT' : 'RIGHT';
    // Roll quality summary
    const rollVals = S.samples.map(s=>s.roll);
    const meanRoll = rollVals.reduce((a,b)=>a+b,0)/rollVals.length;
    const maxRoll  = Math.max(...rollVals);
    const rollNote = maxRoll > 3 ? ` <span class="warn"> max roll ${maxRoll.toFixed(1)}°</span>` : '';
    $('instr').innerHTML =
      `<span>${larger}</span> larger by <span>${diff.toFixed(2)}mm</span>`+
      ` &nbsp;·&nbsp; L:${S.statsL.mean.toFixed(2)} R:${S.statsR.mean.toFixed(2)}mm`+
      rollNote;
  }

  setStatus('DONE','on');
  $('exportBtn').disabled = false;
  $('actionRow').style.display = 'flex';
  $('recRow').style.display = 'none';
  $('poseBadge').className = 'hidden';
  toast(`Done — ${S.samples.length} frames averaged`);
}

// ── render loop ───────────────────────────────────────────────────────────────
async function loop(){
  if(!S.running){ requestAnimationFrame(loop); return; }
  if(video.readyState<2){ requestAnimationFrame(loop); return; }

  resizeCanvas();
  octx.clearRect(0,0,overlay.width,overlay.height);

  try{
    const faces = await S.detector.estimateFaces(video, {flipHorizontal:false});

    if(faces.length){
      let kps = faces[0].keypoints;
      const vw=video.videoWidth||1280, vh=video.videoHeight||720;
      // Normalize to video pixels if landmarks are 0-1
      if(Math.max(...kps.slice(0,10).map(p=>p.x)) < 2)
        kps = kps.map(p=>({x:p.x*vw, y:p.y*vh}));

      if(kps.length >= 478){
        const sc      = canvasScale();
        const lmScale = estimateScale(kps);
        const frontal = !!lmScale;

        // Roll-corrected iris radii (video pixels)
        const roll      = lmScale ? lmScale.roll : 0;
        const lRadVid   = irisRadiusCorrected(kps, 468, 469, roll);
        const rRadVid   = irisRadiusCorrected(kps, 473, 474, roll);

        // Apply scale + parallax correction
        const pf        = lmScale ? lmScale.pFactor : 1;
        const lMm = lmScale ? lRadVid * 2 * lmScale.mmPerPx * pf : null;
        const rMm = lmScale ? rRadVid * 2 * lmScale.mmPerPx * pf : null;

        // ── pose badge ────────────────────────────────────────────────────
        const badge = $('poseBadge');
        badge.className = 'hidden';
        if(!lmScale){
          badge.className = 'bad';
          const rollRaw = rollAngle(kps) * 180 / Math.PI;
          const midX2   = (kps[468].x + kps[473].x) / 2;
          const ld = Math.abs(midX2 - kps[356].x), rd = Math.abs(midX2 - kps[127].x);
          const as = Math.max(ld,rd)/(Math.min(ld,rd)+0.1);
          if(Math.abs(rollRaw) > MAX_ROLL_DEG)
            badge.textContent = `⚠ TILT ${rollRaw.toFixed(1)}° — level the camera`;
          else
            badge.textContent = `⚠ TURN — face the camera straight`;
        } else {
          const ds = lmScale.distStatus;
          if(ds === 'close'){
            badge.className = 'bad';
            badge.textContent = `⚠ TOO CLOSE — move back  (ipd:${lmScale.ipdPx.toFixed(0)}px)`;
          } else if(ds === 'far'){
            badge.className = 'warn';
            badge.textContent = `↔ MOVE CLOSER  (ipd:${lmScale.ipdPx.toFixed(0)}px)`;
          } else {
            badge.className = 'ok';
            const rollSign = lmScale.roll >= 0 ? '+' : '';
            badge.textContent = `✓ GOOD  roll:${rollSign}${lmScale.rollDeg.toFixed(1)}° (w:${lmScale.rollWeight.toFixed(2)})  ipd:${lmScale.ipdPx.toFixed(0)}px`;
          }
        }

        // ── debug ─────────────────────────────────────────────────────────
        $('debugPanel').style.display = '';
        $('dbg1').textContent = `video:${vw}×${vh}  sc:${sc.toFixed(4)}  samples:${S.samples.length}`;
        $('dbg2').textContent = lmScale
          ? `scale:${lmScale.mmPerPx.toFixed(5)}mm/px  parallax:${((1-pf)*100).toFixed(2)}%  ipd:${lmScale.ipdPx.toFixed(1)}px`
          : 'scale: — not frontal';
        $('dbg3').textContent = lmScale
          ? `roll:${lmScale.rollDeg.toFixed(1)}°  yaw:${lmScale.asymm.toFixed(2)}  dist:${lmScale.distStatus}`
          : `pose rejected  roll:${(rollAngle(kps)*180/Math.PI).toFixed(1)}°`;
        $('dbg4').textContent = `L:${lMm?lMm.toFixed(2):'—'}  R:${rMm?rMm.toFixed(2):'—'}mm  lRad:${lRadVid.toFixed(2)}px rRad:${rRadVid.toFixed(2)}px`;

        // ── draw iris circles ─────────────────────────────────────────────
        [[468, '#7b8fff', lRadVid*sc, lMm, 'L'],
         [473, '#ff6b9d', rRadVid*sc, rMm, 'R']]
        .forEach(([ci, col, radCss, mm, side])=>{
          const {cx,cy} = videoPxToCanvas(kps[ci].x, kps[ci].y);
          octx.beginPath(); octx.arc(cx, cy, radCss, 0, Math.PI*2);
          octx.strokeStyle = col;
          octx.lineWidth   = S.recording ? 2.5 : 1.5;
          octx.globalAlpha = S.recording ? 1.0 : 0.55;
          octx.stroke();
          octx.globalAlpha = 1;
          // center dot
          octx.beginPath(); octx.arc(cx, cy, 3, 0, Math.PI*2);
          octx.fillStyle = col; octx.fill();
          // label
          if(mm){
            octx.fillStyle    = col;
            octx.font         = 'bold 11px Space Mono,monospace';
            octx.textAlign    = 'center';
            octx.textBaseline = 'bottom';
            octx.fillText(`${side} ${mm.toFixed(2)}mm`, cx, cy-radCss-4);
          }
        });

        // ── live card update (pre-record) ─────────────────────────────────
        if(!S.statsL && lMm){
          $('valL').textContent = lMm.toFixed(2); $('valL').className = 'rval';
          $('unitL').textContent = 'mm  live';
        }
        if(!S.statsR && rMm){
          $('valR').textContent = rMm.toFixed(2); $('valR').className = 'rval';
          $('unitR').textContent = 'mm  live';
        }

        // ── record ────────────────────────────────────────────────────────
        if(S.recording && S.recStart){
          const elapsed = Date.now() - S.recStart;
          updateRing(elapsed);
          // Accept frame only if pose is good AND distance is ok
          // Distance errors are systematic — averaging doesn't fix them
          if(lMm && rMm && lmScale.distStatus === 'ok'){
            const frame = {
              lMm, rMm,
              scale:      lmScale.mmPerPx,
              asymm:      lmScale.asymm,
              roll:       lmScale.rollDeg,
              rollWeight: lmScale.rollWeight,
              pitch:      lmScale.pitchOff,
              pFactor:    lmScale.pFactor,
            };
            S.samples.push(frame);
            S.allRaw.push({t:Date.now(), ...frame});
          }
          if(elapsed >= REC_SECS*1000){
            S.recording = false;
            finalize();
          }
        }

        // Enable record button only when frontal AND distance is ok
        const distOk = lmScale && lmScale.distStatus === 'ok';
        $('recBtn').disabled = !frontal || !distOk;
        setStatus(S.recording ? 'RECORDING' : 'TRACKING', S.recording ? 'rec' : 'on');

      }
    } else {
      setStatus('NO FACE','warn');
      $('recBtn').disabled = true;
    }
  } catch(e){ console.warn('[IrisMeasure] loop error:', e); }

  requestAnimationFrame(loop);
}

// ── start button ──────────────────────────────────────────────────────────────
$('startBtn').onclick = async () => {
  $('startBtn').disabled=true; $('startBtn').textContent='Starting…';
  setStatus('CAMERA…','warn');
  try{ await startCamera(); }
  catch(e){
    toast('Camera denied — check permissions');
    $('startBtn').disabled=false; $('startBtn').textContent='▶ START'; return;
  }
  setStatus('LOADING…','warn'); $('startBtn').textContent='Loading model…';
  try{ await loadModel(); }
  catch(e){
    toast('Model error: '+(e.message||e));
    setStatus('ERROR','warn');
    $('startBtn').disabled=false; $('startBtn').textContent='▶ RETRY'; return;
  }
  S.running=true;
  $('startRow').style.display='none';
  $('recRow').style.display='flex';
  resizeCanvas();
  requestAnimationFrame(loop);
  $('instr').innerHTML=`Look straight at camera — record button enables when both irises are detected.`;
  setStatus('READY','on');
};

// ── camera + model ────────────────────────────────────────────────────────────
async function startCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:'user', width:{ideal:1280}, height:{ideal:720}}
  });
  video.srcObject = stream;
  return new Promise(res=>{
    video.onloadedmetadata = ()=>{
      video.play();
      const wait=()=>{ video.videoWidth>0 ? res() : requestAnimationFrame(wait); };
      wait();
    };
  });
}
async function loadModel(){
  S.detector = await faceLandmarksDetection.createDetector(
    faceLandmarksDetection.SupportedModels.MediaPipeFaceMesh,
    { runtime:'mediapipe',
      solutionPath:'https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619',
      refineLandmarks:true, maxFaces:1 }
  );
}

// ── record button ─────────────────────────────────────────────────────────────
$('recBtn').onclick = ()=>{
  if(S.recording) return;
  // reset state
  S.samples=[]; S.statsL=null; S.statsR=null;
  $('exportBtn').disabled=true;
  $('actionRow').style.display='none';
  ['valL','valR'].forEach(id=>{ $(id).textContent='—'; $(id).className='rval pending'; });
  $('unitL').textContent='recording…'; $('unitR').textContent='recording…';
  $('ciL').innerHTML=''; $('ciR').innerHTML='';
  // start
  S.recording=true; S.recStart=Date.now();
  $('recRing').style.display='flex';
  $('ringFill').style.strokeDashoffset=CIRC;
  $('ringTime').textContent=REC_SECS;
  $('ringCounts').textContent='0 samples';
  $('instr').innerHTML=`Hold still — look straight ahead. <span class="warn">Frames where face turns are discarded automatically.</span>`;
  toast('Recording — 30s, hold still…');
};

// ── retry button ──────────────────────────────────────────────────────────────
$('retryBtn').onclick = ()=>{
  S.samples=[]; S.statsL=null; S.statsR=null; S.allRaw=[];
  S.recording=false; S.recStart=null;
  ['valL','valR'].forEach(id=>{ $(id).textContent='—'; $(id).className='rval pending'; });
  $('unitL').textContent='not measured'; $('unitR').textContent='not measured';
  $('ciL').innerHTML=''; $('ciR').innerHTML='';
  $('exportBtn').disabled=true;
  $('actionRow').style.display='none';
  $('recRow').style.display='flex';
  $('recRing').style.display='none';
  $('instr').innerHTML=`Look straight at camera — record button enables when both irises are detected.`;
  setStatus('READY','on');
  toast('Cleared — ready to record again');
};

// ── CSV export ────────────────────────────────────────────────────────────────
$('exportBtn').onclick = ()=>{
  const ts = new Date().toISOString().replace(/[:.]/g,'-');
  const rows = ['timestamp_ms,left_mm,right_mm,scale_mm_per_px,asymm,roll_deg,roll_weight,pitch_off,parallax_pct'];
  S.allRaw.forEach(r=>{
    rows.push(`${r.t},${r.lMm.toFixed(4)},${r.rMm.toFixed(4)},${r.scale.toFixed(6)},${r.asymm.toFixed(3)},${r.roll.toFixed(2)},${(r.rollWeight||1).toFixed(3)},${r.pitch.toFixed(3)},${((1-r.pFactor)*100).toFixed(2)}`);
  });
  rows.push('');
  rows.push('# SUMMARY');
  rows.push('side,mean_mm,ci95_mm,n,se_mm');
  if(S.statsL) rows.push(`L,${S.statsL.mean.toFixed(4)},${S.statsL.ci.toFixed(4)},${S.statsL.n},${S.statsL.se.toFixed(4)}`);
  if(S.statsR) rows.push(`R,${S.statsR.mean.toFixed(4)},${S.statsR.ci.toFixed(4)},${S.statsR.n},${S.statsR.se.toFixed(4)}`);
  if(S.statsL&&S.statsR) rows.push(`delta,${Math.abs(S.statsL.mean-S.statsR.mean).toFixed(4)},,,`);
  const blob=new Blob([rows.join('\n')],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=`iris_${ts}.csv`; a.click();
  toast('CSV exported');
};

window.addEventListener('resize', resizeCanvas);
resizeCanvas();
</script>
