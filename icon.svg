<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#050508"/>
  <!-- outer iris ring -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#4af0c8" stroke-width="12" opacity="0.9"/>
  <!-- iris texture spokes -->
  <circle cx="256" cy="256" r="130" fill="none" stroke="#4af0c8" stroke-width="3" opacity="0.25"/>
  <circle cx="256" cy="256" r="100" fill="none" stroke="#7b8fff" stroke-width="3" opacity="0.2"/>
  <!-- pupil -->
  <circle cx="256" cy="256" r="72" fill="#050508"/>
  <circle cx="256" cy="256" r="68" fill="#0d0d18"/>
  <!-- pupil highlight -->
  <circle cx="232" cy="228" r="18" fill="white" opacity="0.12"/>
  <!-- accent ring -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#4af0c8" stroke-width="4" opacity="0.4"/>
  <!-- cardinal tick marks -->
  <line x1="256" y1="76" x2="256" y2="106" stroke="#4af0c8" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <line x1="256" y1="406" x2="256" y2="436" stroke="#4af0c8" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <line x1="76" y1="256" x2="106" y2="256" stroke="#4af0c8" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <line x1="406" y1="256" x2="436" y2="256" stroke="#4af0c8" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
</svg>
